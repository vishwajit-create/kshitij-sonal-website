<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Contact | Kshitij Sonal</title>
<meta name="description" content="Get in touch with Kshitij Sonal — Researcher & Economist.">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<nav class="navbar">
  <a href="/" class="nav-logo">Kshitij Sonal</a>
  <ul class="nav-links" id="nav-links">
    <li><a href="/index.html">Home</a></li><li><a href="/research.html">Research</a></li>
    <li><a href="/articles.html">Articles</a></li><li><a href="/news.html">News</a></li>
    <li><a href="/about.html">About</a></li><li><a href="/contact.html">Contact</a></li>
  </ul>
  <button class="nav-admin-btn" onclick="window.location='/admin/login.html'">⚙ Admin</button>
  <button class="nav-hamburger" id="nav-hamburger"><span></span><span></span><span></span></button>
</nav>
<div class="page-hero">
  <div class="page-hero-kicker">📬 Get in Touch</div>
  <h1 class="page-hero-title">Contact</h1>
  <p class="page-hero-desc">Have a question, collaboration idea, or just want to connect? I'd love to hear from you.</p>
</div>
<section class="section"><div class="section-inner">
  <div class="contact-grid">
    <div class="contact-form-wrap">
      <h2 style="font-size:1.4rem;margin-bottom:1.5rem;color:var(--text)">Send a Message</h2>
      <form id="contact-form">
        <div class="form-group"><label class="form-label">Your Name *</label><input type="text" id="cf-name" class="form-input" placeholder="John Doe" required></div>
        <div class="form-group"><label class="form-label">Email Address *</label><input type="email" id="cf-email" class="form-input" placeholder="john@example.com" required></div>
        <div class="form-group"><label class="form-label">Subject</label><input type="text" id="cf-subject" class="form-input" placeholder="Research collaboration, etc."></div>
        <div class="form-group"><label class="form-label">Message *</label><textarea id="cf-message" class="form-textarea" placeholder="Your message..." required></textarea></div>
        <button type="submit" class="btn btn-primary" style="width:100%;justify-content:center" id="cf-btn">📨 Send Message</button>
        <div class="form-msg" id="cf-msg"></div>
      </form>
    </div>
    <div>
      <h2 style="font-size:1.4rem;margin-bottom:1.5rem;color:var(--text)">Connect Online</h2>
      <div class="social-links-grid" id="social-links">
        <div class="loader"><div class="spinner"></div></div>
      </div>
    </div>
  </div>
</div></section>
<footer class="footer" id="footer-text"><p>© 2025 Kshitij Sonal. All rights reserved.</p></footer>
<script src="/main.js"></script>
<script>
const SOCIALS = [
  { key:'email',       label:'Email',       icon:'✉️',  prefix:'mailto:' },
  { key:'linkedin',    label:'LinkedIn',    icon:'💼',  prefix:'' },
  { key:'twitter',     label:'Twitter / X', icon:'🐦',  prefix:'' },
  { key:'github',      label:'GitHub',      icon:'💻',  prefix:'' },
  { key:'researchgate',label:'ResearchGate',icon:'🔬', prefix:'' },
  { key:'ssrn',        label:'SSRN',        icon:'📋',  prefix:'' },
];
async function load() {
  const s = await applyTheme();
  if (s?.hero?.footerText) document.getElementById('footer-text').innerHTML = '<p>' + s.hero.footerText + '</p>';
  const social = s?.social || {};
  const container = document.getElementById('social-links');
  const items = SOCIALS.map(({ key, label, icon, prefix }) => {
    const val = social[key];
    if (!val) return '';
    const href = prefix + val;
    return `<a href="${href}" target="_blank" rel="noopener" class="social-link-item">
      <div class="social-icon">${icon}</div>
      <div><div class="social-info-label">${label}</div><div class="social-info-value">${val.replace(/https?:\/\/(www\.)?/,'').substring(0,35)}</div></div>
    </a>`;
  }).filter(Boolean);
  container.innerHTML = items.length ? items.join('') : '<p style="color:var(--muted)">Social links not configured yet.</p>';
}

document.getElementById('contact-form').addEventListener('submit', async (e) => {
  e.preventDefault();
  const btn = document.getElementById('cf-btn');
  const msg = document.getElementById('cf-msg');
  btn.textContent = '⏳ Sending...'; btn.disabled = true;
  msg.className = 'form-msg'; msg.style.display = 'none';
  try {
    const res = await fetch('/api/contact', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({
        name: document.getElementById('cf-name').value,
        email: document.getElementById('cf-email').value,
        subject: document.getElementById('cf-subject').value,
        message: document.getElementById('cf-message').value,
      })
    });
    const data = await res.json();
    if (data.success) {
      msg.textContent = '✅ Message sent! I will get back to you soon.';
      msg.className = 'form-msg success';
      document.getElementById('contact-form').reset();
    } else {
      msg.textContent = '❌ ' + (data.error || 'Failed to send. Try again.');
      msg.className = 'form-msg error';
    }
  } catch { msg.textContent = '❌ Network error. Please try again.'; msg.className = 'form-msg error'; }
  finally { btn.textContent = '📨 Send Message'; btn.disabled = false; }
});

document.addEventListener('DOMContentLoaded', load);
</script>
</body></html>
