<script src="/main.js"></script>
<script>
async function loadResearch() {
  try {
    const s = await applyTheme();
    if (s?.hero?.footerText) document.getElementById('footer-text').innerHTML = '<p>' + s.hero.footerText + '</p>';
    const items = await fetch('/api/research').then(x=>x.json());
    const grid = document.getElementById('research-grid');
    grid.className = 'cards-grid';
    grid.innerHTML = items.length ? items.map(researchCard).join('') : emptyHtml('No research papers published yet.');
  } catch(e) { document.getElementById('research-grid').innerHTML = emptyHtml('Failed to load research.'); }
}
document.addEventListener('DOMContentLoaded', loadResearch);
</script>
