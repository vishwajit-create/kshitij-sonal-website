version: '3.9'

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: kshitij-sonal-web
    restart: unless-stopped
    ports:
      - '3000:3000'
    # Mount the data directory so JSON files persist on the host
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - PORT=3000
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
